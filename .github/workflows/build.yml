name: Build Multi-Platform Binaries

on:
  push:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  FILE_NAME: EpisodeReName.py
  APP_NAME: EpisodeReName

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Build EXE (PyInstaller)
        run: pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --icon=logo.ico --add-data "nc_raws_auto.txt;utils" ${{ env.FILE_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: dist/${{ env.APP_NAME }}.exe

  build-windows-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Windows ARM64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE (PyInstaller)
        run: pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --icon=logo.ico --add-data "nc_raws_auto.txt;utils" ${{ env.FILE_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-arm64
          path: dist/${{ env.APP_NAME }}.exe

  build-macos-x64:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build macOS x64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (PyInstaller)
        run: |
          pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --icon=logo.icns --add-data "nc_raws_auto.txt:utils" ${{ env.FILE_NAME }}
          chmod +x dist/${{ env.APP_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x64
          path: dist/${{ env.APP_NAME }}

  build-macos-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build macOS ARM64
    runs-on: macos-14 # M1 运行器
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (PyInstaller)
        run: |
          pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --icon=logo.icns --add-data "nc_raws_auto.txt:utils" ${{ env.FILE_NAME }}
          chmod +x dist/${{ env.APP_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: dist/${{ env.APP_NAME }}

  build-linux-x64:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (PyInstaller)
        run: pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --add-data "nc_raws_auto.txt:utils" ${{ env.FILE_NAME }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: dist/${{ env.APP_NAME }}

  build-linux-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Build Linux ARM64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build (PyInstaller)
        run: pyinstaller -F --clean --noconfirm --name=${{ env.APP_NAME }} --add-data "nc_raws_auto.txt:utils" ${{ env.FILE_NAME }}
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: dist/${{ env.APP_NAME }}

  release:
    name: Create Release
    needs:
      - build-windows
      - build-windows-arm64
      - build-macos-x64
      - build-macos-arm64
      - build-linux-x64
      - build-linux-arm64
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: List downloaded files
        run: ls -R downloaded

      - name: Flatten artifacts for release
        run: |
          set -e
          mkdir -p release-assets
          # Windows x64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-windows-x64/${{ env.APP_NAME }}.exe" ] && \
            cp "downloaded/${{ env.APP_NAME }}-windows-x64/${{ env.APP_NAME }}.exe" "release-assets/${{ env.APP_NAME }}-windows-x64.exe" || true
          # Windows ARM64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-windows-arm64/${{ env.APP_NAME }}.exe" ] && \
            cp "downloaded/${{ env.APP_NAME }}-windows-arm64/${{ env.APP_NAME }}.exe" "release-assets/${{ env.APP_NAME }}-windows-arm64.exe" || true
          # macOS x64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-macos-x64/${{ env.APP_NAME }}" ] && \
            cp "downloaded/${{ env.APP_NAME }}-macos-x64/${{ env.APP_NAME }}" "release-assets/${{ env.APP_NAME }}-macos-x64" || true
          # macOS ARM64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-macos-arm64/${{ env.APP_NAME }}" ] && \
            cp "downloaded/${{ env.APP_NAME }}-macos-arm64/${{ env.APP_NAME }}" "release-assets/${{ env.APP_NAME }}-macos-arm64" || true
          # Linux x64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-linux-x64/${{ env.APP_NAME }}" ] && \
            cp "downloaded/${{ env.APP_NAME }}-linux-x64/${{ env.APP_NAME }}" "release-assets/${{ env.APP_NAME }}-linux-x64" || true
          # Linux ARM64 构建产物
          [ -f "downloaded/${{ env.APP_NAME }}-linux-arm64/${{ env.APP_NAME }}" ] && \
            cp "downloaded/${{ env.APP_NAME }}-linux-arm64/${{ env.APP_NAME }}" "release-assets/${{ env.APP_NAME }}-linux-arm64" || true
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Generate release notes
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          if ! awk -v version="$VERSION" '
            BEGIN { header = "## [" version "]" }
            index($0, header) == 1 { found = 1; print; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > RELEASE_NOTES.md; then
            echo "未在 CHANGELOG.md 中找到版本 ${VERSION} 的更新内容"
            exit 1
          fi
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "未在 CHANGELOG.md 中找到版本 ${VERSION} 的更新内容"
            exit 1
          fi
          cat RELEASE_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: release-assets/*
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
